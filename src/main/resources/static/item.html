<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eMarketplace - Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h1 onclick="location.href='index.html'">eMarketplace</h1>
</div>

<div class="container-detail" id="detailsContainer">
    <div class="img-wrapper">
        <img class="item-img" id="itemImg" src="" alt="Item Image">
    </div>

    <div class="meta-info">
        <p class="title" id="itemTitle">Loading...</p>
        <p class="price-detail" id="itemPrice"></p>
        <p class="seller-detail" id="itemSeller"></p>
    </div>

    <div class="date" id="itemDate"></div>
    <div class="description" id="itemDescription"></div>

    <a href="index.html" class="back-link">← Back to Marketplace</a>
</div>

<script src="item.js"></script>
</body>
</html>
