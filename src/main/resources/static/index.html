<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eMarketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">

    <h1 onclick="location.href='index.html'">
        eMarketplace
    </h1>

    <div class="header-right">

        <span id="usernameDisplay"></span>

        <button
                id="logoutBtn"
                class="logout-btn"
                onclick="logout()"
        >
            Logout
        </button>

        <a href="login.html" id="loginBtn" class="auth-btn">
            Login
        </a>

        <a href="register.html" id="registerBtn" class="auth-btn">
            Register
        </a>

        <a href="new-item.html" class="new-btn">
            New
        </a>

    </div>

</div>

<div class="container">

    <div class="top-bar">

        <div class="total-count">
            <span id="totalItems">0</span>
            items in total
        </div>

        <select id="sortSelect">

            <option value="dateDesc">
                Date Descending
            </option>

            <option value="dateAsc">
                Date Ascending
            </option>

            <option value="priceAsc">
                Price Ascending
            </option>

            <option value="priceDesc">
                Price Descending
            </option>

        </select>

    </div>

    <div class="grid" id="itemsGrid"></div>

    <div class="pagination">

        <button id="prevBtn">
            Previous
        </button>

        <span id="pageNumber">1</span>

        <button id="nextBtn">
            Next
        </button>

    </div>

</div>

<script src="index.js"></script>

</body>
</html>
